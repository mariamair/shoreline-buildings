name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          docker compose build ghcr.io/${{ github.repository_owner }}/shorelinebuildings:latest .

      - name: Push Docker image to GHCR
        run: |
          docker compose push ghcr.io/${{ github.repository_owner }}/shorelinebuildings:latest

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_HOST_USER: ${{ secrets.PRODUCTION_HOST_USER }}
      PRODUCTION_HOST_DEPLOY_PATH: ${{ secrets.PRODUCTION_HOST_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: | 
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      
      - name: Copy docker-compose files to server
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
          docker-compose.yml \
          docker-compose.production.yml \
          $PRODUCTION_HOST_USER@$PRODUCTION_HOST:$PRODUCTION_HOST_DEPLOY_PATH/

      - name: Pull and Deploy Docker Image via SSH
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_HOST_USER: ${{ secrets.PRODUCTION_HOST_USER }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET}}
        run: |
          ssh -tt -o StrictHostKeyChecking=no $PRODUCTION_HOST_USER@$PRODUCTION_HOST << EOF
            pwd && ls -la
            echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" >> $PRODUCTION_HOST_DEPLOY_PATH/.env.production
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            sudo docker pull ghcr.io/${{ github.repository_owner }}/shorelinebuildings:latest
            cd $PRODUCTION_HOST_DEPLOY_PATH
            sudo docker compose -p shorelinebuildings \
            -f docker-compose.yml \
            -f docker-compose.production.yml \
            --env-file .env.production \
            up -d
            exit
          EOF
