name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          BACKEND_PORT=8080
          SESSION_SECRET=${{ secrets.SESSION_SECRET }}
          CSV_PATH=seed/data/shoreline_buildings.csv
          EOF

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: docker compose build

      - name: Push Docker image to GHCR
        run: docker compose push

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: []
    if: github.ref == 'refs/heads/main'
    env:
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
      PRODUCTION_HOST_USER: ${{ secrets.PRODUCTION_HOST_USER }}
      PRODUCTION_HOST_DEPLOY_PATH: ${{ secrets.PRODUCTION_HOST_DEPLOY_PATH }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: | 
          set -x
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.PRODUCTION_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
      
      - name: Copy docker-compose files to server
        run: |
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 \
          docker-compose.yml \
          $PRODUCTION_HOST_USER@$PRODUCTION_HOST:$PRODUCTION_HOST_DEPLOY_PATH/

      - name: Pull and Deploy Docker Image via SSH
        env:
          PRODUCTION_HOST: ${{ secrets.PRODUCTION_HOST }}
          PRODUCTION_HOST_USER: ${{ secrets.PRODUCTION_HOST_USER }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET}}
        run: |
          ssh -v -tt -o StrictHostKeyChecking=no $PRODUCTION_HOST_USER@$PRODUCTION_HOST << EOF
            pwd && ls -la
            cat > ${{ secrets.PRODUCTION_HOST_DEPLOY_PATH }}/.env << 'ENVFILE'
              DB_NAME=${{ secrets.DB_NAME }}
              DB_USER=${{ secrets.DB_USER }}
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              DB_HOST=db
              DB_PORT=5432
              BACKEND_PORT=8080
              SESSION_SECRET=${{ secrets.SESSION_SECRET }}
              CSV_PATH=seed/data/shoreline_buildings.csv
              ENVFILE
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd $PRODUCTION_HOST_DEPLOY_PATH
            sudo docker compose pull
            sudo docker compose up -d
            exit
          EOF
